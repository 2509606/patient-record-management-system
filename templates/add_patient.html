{% extends "base.html" %}
{% block title %}Add Patient - Patient Records{% endblock %}
{% block page_title %}Add Patient{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="mb-6">
        <h1 class="text-2xl font-semibold text-foreground tracking-tight">Add New Patient</h1>
        <p class="text-sm text-muted-foreground mt-1">Fill in the patient details below</p>
    </div>

    <div class="bg-card border border-border rounded-xl shadow-sm">
        <form method="POST" class="p-6 space-y-5">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div>
                    <label for="age" class="block text-sm font-medium text-foreground mb-1.5">Age</label>
                    <input type="number" id="age" name="age" required
                           class="w-full px-3 py-2 text-sm rounded-lg border border-input bg-background text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring/40 focus:border-ring transition-colors">
                </div>

                <div>
                    <label for="sex" class="block text-sm font-medium text-foreground mb-1.5">Sex</label>
                    <select id="sex" name="sex" required
                            class="w-full px-3 py-2 text-sm rounded-lg border border-input bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring/40 focus:border-ring transition-colors">
                        <option value="">-- Select --</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div>
                    <label for="blood_pressure" class="block text-sm font-medium text-foreground mb-1.5">Blood Pressure</label>
                    <input type="text" id="blood_pressure" name="blood_pressure" placeholder="e.g. 120/80"
                           class="w-full px-3 py-2 text-sm rounded-lg border border-input bg-background text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring/40 focus:border-ring transition-colors">
                </div>

                <div>
                    <label for="cholesterol" class="block text-sm font-medium text-foreground mb-1.5">Cholesterol</label>
                    <select id="cholesterol" name="cholesterol"
                            class="w-full px-3 py-2 text-sm rounded-lg border border-input bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring/40 focus:border-ring transition-colors">
                        <option value="">-- Select --</option>
                        <option value="Normal">Normal</option>
                        <option value="Above Normal">Above Normal</option>
                        <option value="High">High</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div>
                    <label for="fasting_blood_sugar" class="block text-sm font-medium text-foreground mb-1.5">Fasting Blood Sugar &gt; 120 mg/dl</label>
                    <select id="fasting_blood_sugar" name="fasting_blood_sugar"
                            class="w-full px-3 py-2 text-sm rounded-lg border border-input bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring/40 focus:border-ring transition-colors">
                        <option value="">-- Select --</option>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>

                <div>
                    <label for="resting_ecg" class="block text-sm font-medium text-foreground mb-1.5">Resting ECG</label>
                    <select id="resting_ecg" name="resting_ecg"
                            class="w-full px-3 py-2 text-sm rounded-lg border border-input bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring/40 focus:border-ring transition-colors">
                        <option value="">-- Select --</option>
                        <option value="Normal">Normal</option>
                        <option value="Abnormal">Abnormal</option>
                    </select>
                </div>
            </div>

            <div class="sm:w-1/2">
                <label for="exercise_angina" class="block text-sm font-medium text-foreground mb-1.5">Exercise-Induced Angina</label>
                <select id="exercise_angina" name="exercise_angina"
                        class="w-full px-3 py-2 text-sm rounded-lg border border-input bg-background text-foreground focus:outline-none focus:ring-2 focus:ring-ring/40 focus:border-ring transition-colors">
                    <option value="">-- Select --</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit"
                        class="inline-flex items-center px-4 py-2 text-sm font-medium rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 transition-colors cursor-pointer">
                    Add Patient
                </button>
                <a href="{{ url_for('patients_bp.patients') }}"
                   class="inline-flex items-center px-4 py-2 text-sm font-medium rounded-lg border border-border bg-background text-foreground hover:bg-accent transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
